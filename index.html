<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChooseWho - First Player Selector</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A premium mobile-first finger selector to determine the first player in board games.">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <div id="touch-overlay"></div>
        <div id="mode-toggle">
            <div class="mode-btn active" data-mode="winner">Winner</div>
            <div class="mode-btn" data-mode="order">Order</div>
        </div>
        <div id="ui-overlay">
            <h1 id="status-text">Place fingers to start</h1>
            <div id="countdown-timer" class="hidden"></div>
        </div>
        <div id="history-overlay">
            <div id="history-list"></div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
