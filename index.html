<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChooseWho - First Player Selector</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A premium mobile-first finger selector to determine the first player in board games.">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <div id="touch-overlay"></div>
        <header id="top-bar">
            <div id="mode-toggle">
                <div class="mode-btn active" data-mode="winner">Chosen</div>
                <div class="mode-btn" data-mode="order">Order</div>
                <div class="mode-btn" data-mode="die">Die</div>
                <div class="mode-btn" data-mode="teams">Teams</div>
            </div>

            <div id="history-overlay" class="hidden">
                <div id="history-list"></div>
                <button id="clear-history">Clear</button>
            </div>
        </header>

        <div id="settings-modal" class="hidden">
            <div id="settings-content">
                <div class="settings-header">
                    <h2>Settings</h2>
                    <button id="close-settings-btn" class="icon-btn">✖</button>
                </div>
                <div class="settings-row">
                    <label>Volume</label>
                    <div id="volume-toggle">
                        <button id="mute-btn" class="icon-btn">🔊</button>
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                    </div>
                </div>
                <div class="settings-row">
                    <label>Language</label>
                    <div id="lang-toggle">
                        <select id="lang-select">
                            <option value="en">EN</option>
                            <option value="es">ES</option>
                        </select>
                    </div>
                </div>
                <div class="settings-row">
                    <label>Theme</label>
                    <div id="theme-toggle">
                        <select id="theme-select">
                            <option value="neon">Neon</option>
                            <option value="retro">Retro</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="ui-overlay">
            <h1 id="status-text">Place fingers to start</h1>
            <div id="countdown-timer" class="hidden"></div>
            <div id="desktop-controls" class="hidden">
                <button id="start-btn" class="control-btn">Start</button>
                <button id="reset-board-btn" class="control-btn hidden">Reset</button>
            </div>
        </div>

        <button id="settings-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </main>
    <script src="app.js"></script>
</body>
</html>
