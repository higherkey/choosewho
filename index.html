<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChooseWho - First Player Selector</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A premium mobile-first finger selector to determine the first player in board games.">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <div id="touch-overlay"></div>
        <header id="top-bar">
            <div id="mode-toggle">
                <div class="mode-btn active" data-mode="winner">Chosen</div>
                <div class="mode-btn" data-mode="order">Order</div>
            </div>
            <div id="volume-toggle">
                <button id="mute-btn" class="icon-btn">🔊</button>
                <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
            <div id="history-overlay">
                <div id="history-list"></div>
                <button id="clear-history">Clear</button>
            </div>
        </header>
        <div id="ui-overlay">
    </main>
    <script src="app.js"></script>
</body>
</html>
